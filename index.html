<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guild Dashboard</title>

<style>
body {
  background: 
  radial-gradient(circle at 20% 20%, rgba(255,215,0,0.08), transparent),
  radial-gradient(circle at 80% 30%, rgba(255,0,0,0.05), transparent),
  radial-gradient(circle at top, #1a1a1f, #000);
  color: #e6d3a3;
  font-family: 'Cinzel', serif;
}

h1 {
  text-align: center;
  margin: 30px;
  letter-spacing: 2px;
}

.controls {
  text-align: center;
  margin-bottom: 15px;
}

.toggle-btn {
  background: linear-gradient(45deg, gold, orange);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

#guild {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* layout rows ONLY (không đụng card) */
.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* ===== GIỮ NGUYÊN HIỆU ỨNG ===== */
.card {
  width: 240px;
  margin: 15px;
  padding: 18px;
  border-radius: 12px;
  background: linear-gradient(#0f0f15, #0a0a0f) padding-box,
              linear-gradient(45deg, rgba(255,215,0,0.3), transparent) border-box;
  border: 1px solid transparent;
  transition: 0.3s;
  position: relative;
  animation: float 5s ease-in-out infinite;
}

.card:hover {
  transform: scale(1.07) translateY(-3px);
  animation: none;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.title {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 5px;
}

.icon {
  width: 16px;
  height: 16px;
  vertical-align: middle;
  margin-right: 5px;
  filter: brightness(1.3) drop-shadow(0 0 2px gold);
}

.badge {
  position: absolute;
  font-weight: bold;
  top: -10px;
  right: -10px;
  background: linear-gradient(45deg, gold, orange);
  box-shadow: 0 0 20px gold;
  color: black;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 6px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 5px gold; }
  to { box-shadow: 0 0 15px gold; }
}
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0px); }
}

.guild-founder { box-shadow: 0 0 25px red, inset 0 0 10px rgba(255,0,0,0.5); }
.guild-master { box-shadow: 0 0 25px gold; }
.guild-assistance { box-shadow: 0 0 20px orange; }
.battle-master { box-shadow: 0 0 20px violet; }
.guild-member { opacity: 0.9; }

.stat {
  margin-top: 6px;
  font-family: Arial, sans-serif;
  font-size: 14px;
}
/* ===== SLOGAN BUBBLE ===== */
.slogan {
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: #ffd700;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  box-shadow: 0 0 10px gold;
  z-index: 10;
}

.slogan::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(0,0,0,0.9);
}
.card:hover .slogan{
  opacity: 1;
  transform: translateX(-50%) translateY(-5px);
}

</style>
</head>

<body>

<h1>
  <img class="icon" src="https://img.icons8.com/?size=100&id=bJclkWKA0ENc&format=png&color=FFD700"/>
  Guild Members
  <img class="icon" src="https://img.icons8.com/?size=100&id=bJclkWKA0ENc&format=png&color=FFD700"/>
</h1>

<div class="controls">
  <button id="toggleView" class="toggle-btn">View by Roles</button>
</div>

<div id="guild"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLv4UPaEHdOZ_9n3W0DsR-Uj_FHVGC3mVRz4efxnB_JJ25mcRDqKc5kLvWEWCrDagxJYBdejgtQGbI/pub?gid=0&single=true&output=csv";

let members = [];
let currentView = "contribution";

fetch(CSV_URL)
.then(res => res.text())
.then(text => {

  const rows = text.split("\n").map(r => r.split(","));
  const data = rows.slice(1);

  members = data
    .filter(r => r[1]?.trim() === "active")
    .map(r => ({
      name: r[3]?.trim(),
      class: r[4]?.trim(),
      level: r[5]?.trim(),
      title: r[2]?.trim(),
      arkar: Number(r[11]) || 0,
      cs: Number(r[12]) || 0,
      total: Number(r[14]) || 0
	  slogan: r[15]?.trim() || ""
    }));

  members.sort((a,b)=>b.total-a.total);

  render();
});

document.getElementById("toggleView").onclick = () => {
  currentView = currentView === "contribution" ? "roles" : "contribution";
  document.getElementById("toggleView").innerText =
    currentView === "contribution" ? "View by Roles" : "View by Contribution";
  render();
};

function render(){
  const container = document.getElementById("guild");
  container.innerHTML = "";

  if(currentView === "contribution"){
    renderContribution(container);
  } else {
    renderRoles(container);
  }
}

/* ===== VIEW CONTRIBUTION ===== */
function renderContribution(container){

  // Top 1
  container.appendChild(makeRow([members[0]], true));

  // Top 2-3
  container.appendChild(makeRow(members.slice(1,3)));

  // Others (3 per row)
  for(let i=3;i<members.length;i+=3){
    container.appendChild(makeRow(members.slice(i,i+3)));
  }
}

/* ===== VIEW ROLES ===== */
function renderRoles(container){

  const get = role => members.filter(m => m.title.toLowerCase() === role);

  container.appendChild(makeRow(get("guild master")));

  container.appendChild(makeRow([
    get("guild founder")[0],
    get("guild assistance")[0],
    get("battle master")[0]
  ].filter(Boolean)));

  const others = members.filter(m =>
    !["guild master","guild founder","guild assistance","battle master"]
    .includes(m.title.toLowerCase())
  );

  for(let i=0;i<others.length;i+=3){
    container.appendChild(makeRow(others.slice(i,i+3)));
  }
}

/* ===== UTIL ===== */
function makeRow(list, isTop=false){
  const row = document.createElement("div");
  row.className = "row";

  list.forEach((m,i)=>{
    if(!m) return;
    row.appendChild(createCard(m, i, isTop && i===0));
  });

  return row;
}

function createCard(m, index=0, isTop1=false){

  const div = document.createElement("div");
  let roleClass = m.title.toLowerCase().replaceAll(" ", "-");

  let badge = "";
  if(currentView === "contribution" && isTop1){
    badge = `<div class="badge">🏆 Top</div>`;
  }

  // chỉ tạo slogan nếu có dữ liệu
  let sloganHTML = "";
  if (m.slogan && m.slogan !== "") {
    sloganHTML = `<div class="slogan">"${m.slogan}"</div>`;
  }

  div.className = "card " + roleClass;

  div.innerHTML = `
    ${badge}
    ${sloganHTML}

    <div class="name">${m.name}</div>
    <div>${m.class} - Lv ${m.level}</div>
    <div class="title">${m.title}</div>

    <div class="stat"><img class="icon" src="https://img.icons8.com/?size=100&id=bJclkWKA0ENc&format=png&color=FFD700"> Arkar War: ${m.arkar}</div>
    <div class="stat"><img class="icon" src="https://img.icons8.com/?size=100&id=92096&format=png&color=FFD700"/>Castle Siege: ${m.cs}</div>
    <div class="stat">🎯 Total Joined Events: ${m.total}</div>
  `;

  return div;
}
</script>

</body>
</html>
